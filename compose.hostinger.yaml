name: eva-hadox-org

services:
  archive:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eva-hadox-archive-prod
    environment:
      PORT: 8080
      DATA_DIR: /app/runtime-data
    ports:
      - "127.0.0.1:4174:8080"
    volumes:
      - ./runtime-data:/app/runtime-data
    restart: unless-stopped
